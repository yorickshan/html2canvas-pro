name: CI

on:
    push:
        branches: [main]
        tags:
            - 'v*'
    pull_request:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest
        name: Build
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
            - name: Cache node modules
              uses: actions/cache@v4
              env:
                  cache-name: cache-node-modules
              with:
                  # npm cache files are stored in `~/.npm` on Linux/macOS
                  path: ~/.npm
                  key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-build-${{ env.cache-name }}-
                      ${{ runner.os }}-build-
                      ${{ runner.os }}-
            - name: Npm install
              run: npm ci
            - name: Build
              run: npm run build
            - name: Check bundle size
              run: |
                  echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
                  for file in dist/html2canvas-pro.js dist/html2canvas-pro.min.js dist/html2canvas-pro.esm.js; do
                    if [ -f "$file" ]; then
                      size=$(stat -c%s "$file" 2>/dev/null || stat -f%z "$file")
                      size_kb=$(echo "scale=1; $size / 1024" | bc)
                      echo "- \`$file\`: **${size_kb} KB** ($size bytes)" >> $GITHUB_STEP_SUMMARY
                      # Alert if full bundle exceeds 200 KB
                      if [ "$file" = "dist/html2canvas-pro.js" ] && [ "$size" -gt 204800 ]; then
                        echo "::warning file=$file,title=Bundle size warning::Full bundle exceeds 200 KB (${size_kb} KB)"
                      fi
                      # Alert if minified bundle exceeds 80 KB
                      if [ "$file" = "dist/html2canvas-pro.min.js" ] && [ "$size" -gt 81920 ]; then
                        echo "::warning file=$file,title=Bundle size warning::Minified bundle exceeds 80 KB (${size_kb} KB)"
                      fi
                    fi
                  done
            - name: Pack
              run: |
                  npm pack
                  mv html2canvas-*.tgz html2canvas-pro.tgz
                  tar --list --verbose --file=html2canvas-pro.tgz
            - name: Upload npm pack
              uses: actions/upload-artifact@v4
              with:
                  name: npm
                  path: html2canvas-pro.tgz
                  if-no-files-found: error
            - name: Upload dist
              uses: actions/upload-artifact@v4
              with:
                  name: dist
                  path: dist
                  if-no-files-found: error
            - name: Upload build
              uses: actions/upload-artifact@v4
              with:
                  name: build
                  path: build
                  if-no-files-found: error

    test:
        runs-on: ubuntu-latest
        name: Test
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
            - name: Cache node modules
              uses: actions/cache@v4
              env:
                  cache-name: cache-node-modules
              with:
                  # npm cache files are stored in `~/.npm` on Linux/macOS
                  path: ~/.npm
                  key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-build-${{ env.cache-name }}-
                      ${{ runner.os }}-build-
                      ${{ runner.os }}-
            - name: Npm install
              run: npm ci
            - name: Build
              run: npm run build
            - name: Lint
              run: npm run lint
            - name: Unit tests
              run: npm run unittest
    browser-test:
        strategy:
            fail-fast: false
            matrix:
                config:
                    - os: ubuntu-latest
                      name: Linux Firefox Stable
                      targetBrowser: Firefox_Stable
                      xvfb: true
                    - os: ubuntu-latest
                      name: Linux Chrome Stable
                      targetBrowser: Chrome_Stable
                      xvfb: true
                    - os: macos-latest
                      name: OSX Safari Stable
                      targetBrowser: Safari_Stable
        runs-on: ${{ matrix.config.os }}
        name: ${{ matrix.config.name }}
        env:
            TARGET_BROWSER: ${{ matrix.config.targetBrowser }}
        needs: build
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
            - name: Cache node modules
              uses: actions/cache@v4
              env:
                  cache-name: cache-node-modules
              with:
                  # npm cache files are stored in `~/.npm` on Linux/macOS
                  path: ~/.npm
                  key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-build-${{ env.cache-name }}-
                      ${{ runner.os }}-build-
                      ${{ runner.os }}-
            - name: Npm install
              run: npm ci
            - name: Download library
              uses: actions/download-artifact@v4
              with:
                  name: dist
                  path: dist
            - name: Download test-runner
              uses: actions/download-artifact@v4
              with:
                  name: build
                  path: build
            - name: Ensure karma prerequisites
              run: npm run prekarma
            - name: xcode selection
              if: ${{ matrix.config.xcode != '' }}
              run: sudo xcode-select -s "${{ matrix.config.xcode }}"
            - name: Run browser tests
              if: ${{ matrix.config.xvfb != true }}
              run: npm run karma
            - name: Start Xvfb
              if: ${{ matrix.config.xvfb == true }}
              run: Xvfb :99 &
            - name: Run browser tests
              if: ${{ matrix.config.xvfb == true }}
              run: DISPLAY=:99 npm run karma
            - name: Upload screenshots
              uses: actions/upload-artifact@v4
              with:
                  name: reftest-results-${{ matrix.config.targetBrowser }}
                  path: tmp/reftests
                  if-no-files-found: error
                  compression-level: 6
                  overwrite: false
    publish:
        runs-on: ubuntu-latest
        name: Publish NPM
        if: startsWith(github.ref, 'refs/tags/v')
        needs: browser-test
        permissions:
            contents: write
            # Required for OIDC trusted publishing to npm
            id-token: write
        steps:
            - uses: actions/checkout@v4
            - name: Download NPM package
              uses: actions/download-artifact@v4
              with:
                  name: npm
                  path: npm
            - name: Download library
              uses: actions/download-artifact@v4
              with:
                  name: dist
                  path: dist
            - name: Create Github Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.ref }}
                  body: |
                    Please refer to [CHANGELOG.md](https://github.com/yorickshan/html2canvas-pro/blob/main/CHANGELOG.md) for details.
                  draft: false
                  prerelease: ${{ contains(github.ref, '-rc.') || contains(github.ref, '-alpha.') }}
                  files: |
                    dist/html2canvas-pro.js
                    dist/html2canvas-pro.min.js
                    dist/html2canvas-pro.esm.js
            - name: Unpack npm
              run: cd npm && tar -xvzf "html2canvas-pro.tgz"
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  registry-url: 'https://registry.npmjs.org'
            # NPM Publish using OIDC trusted publishing (recommended approach)
            # To enable: Configure trusted publishing at https://www.npmjs.com/settings/html2canvas-pro/publishing
            - name: NPM Publish (OIDC)
              run: |
                  cd npm/package
                  npm publish --access public

<!DOCTYPE html>
<html>
    <head>
        <title>Text-decoration:underline tests</title>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
        <script type="text/javascript" src="../../test.js"></script>
        <script type="text/javascript">
            function setUp() {
                document.body.innerHTML = '';
                ['arial','verdana','tahoma','courier new'].forEach(function(e) {
                    var div = document.createElement('div');
                    div.style.fontFamily = e;
                    document.body.appendChild(div);
                    for (var i = 0; i <= 10; i++) {
                        var text = document.createElement('div');
                        text.textContent = 'Testing texts';
                        text.style.marginTop = '1px';
                        text.style.fontSize = (16 + i * 6) + 'px';
                        div.appendChild(text);
                    }
                });
            }
        </script>

        <style>
            .small{
                font-size:14px;
            }

            .medium{
                font-size:18px;
            }
            .large{
                font-size:24px;
            }

            div{
                text-decoration:underline;
                line-height:40px;
            }



            h2 {
                clear:both;
            }
        </style>

    </head>
    <body>
        Creating content through JavaScript
    </body>
</html>
